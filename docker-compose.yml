# Two interchangeable RESP servers for running the Redis/Valkey conformance suites.
# go-redis speaks the same protocol to both, so the five backend packages
# (coordinator, presence, store, ssehistory, persistence) run identically against either one; the
# point of shipping both here is to make that interchangeability one command away.
#
#   docker compose up -d
#   TEST_REDIS_ADDR=127.0.0.1:6399 mise exec go@1.26.5 --command "go test ./... -race -count=1"   # against Redis
#   TEST_REDIS_ADDR=127.0.0.1:6400 mise exec go@1.26.5 --command "go test ./... -race -count=1"   # against Valkey
#   docker compose down
#
# The two services listen on different host ports so both can run at once; point
# TEST_REDIS_ADDR at whichever you want a given test run to exercise.
services:
  redis:
    image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    ports:
      - "6399:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  valkey:
    image: valkey/valkey@sha256:cfe71288f087704b06be45e270afa7a2abbf820093d6b11a23762081f5ff321d
    ports:
      - "6400:6379"
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
